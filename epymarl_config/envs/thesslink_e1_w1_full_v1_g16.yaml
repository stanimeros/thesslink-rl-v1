env: "gymma"

env_args:
  key: "thesslink_rl:thesslink/ThessLink-e1-w1-full-v1-g16"
  time_limit: 120
  pretrained_wrapper: null
  neg_agreement_scale: 5.0
  nav_step_penalty: 0.05
  nav_team_scale: 50.0

common_reward: false

test_greedy: True
test_nepisode: 32
runner_log_interval: 20000
learner_log_interval: 20000
t_max: 2000000
save_model: True
save_model_interval: 400000
log_interval: 20000
test_interval: 50000
