env: "gymma"

env_args:
  key: "thesslink_rl:thesslink/ThessLink-e3-w6-nav-v1-g64"
  time_limit: 512
  pretrained_wrapper: null
  grid_size: 64
  shaping_gamma: 0.99
  step_penalty: -0.01
  arrival_scale: 50.0
  timeout_penalty: -12.0
  time_scale: 50.0

common_reward: false

test_greedy: True
test_nepisode: 32
runner_log_interval: 20000
learner_log_interval: 20000
t_max: 2000000
save_model: True
save_model_interval: 400000
log_interval: 20000
test_interval: 50000
