env: "gymma"

env_args:
  key: "thesslink_rl:thesslink/ThessLink-e2-w2-full-v1-g32"
  time_limit: 480
  pretrained_wrapper: null
  grid_size: 32
  shaping_gamma: 0.99
  neg_suggest_bonus: 0.1
  neg_persist_bonus: 0.05
  neg_accept_bonus: 0.1
  neg_agreement_scale: 10.0
  nav_step_penalty: 0.01
  nav_arrival_scale: 10.0
  nav_team_scale: 50.0

common_reward: false

test_greedy: True
test_nepisode: 32
runner_log_interval: 20000
learner_log_interval: 20000
t_max: 2000000
save_model: True
save_model_interval: 400000
log_interval: 20000
test_interval: 50000
