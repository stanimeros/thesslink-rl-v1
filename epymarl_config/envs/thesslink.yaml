env: "gymma"

env_args:
  key: "thesslink_rl:thesslink/ThessLink-v0"
  time_limit: 100
  pretrained_wrapper: null

# EPyMARL: QMIX, VDN, and COMA always use ``common_reward=True``. This flag applies
# to algorithms that support per-agent rewards (IQL, MAPPO) and when running ``main.py``
# without extra ``with`` overrides.
common_reward: false

test_greedy: True
test_nepisode: 32
runner_log_interval: 2000
learner_log_interval: 2000
