env: "gymma"

env_args:
  key: "thesslink_rl:thesslink/ThessLink-e3-w5-neg-v1-g32"
  time_limit: 480
  pretrained_wrapper: null
  grid_size: 32
  step_penalty: -0.05
  suggest_bonus: 0.15
  accept_bonus: 1.5
  convergence_bonus: 0.3
  optimal_agreement_bonus: 25.0
  suboptimal_agreement_bonus: 0.5
  wrong_agreement_penalty: -8.0
  timeout_penalty: -8.0

common_reward: true

test_greedy: True
test_nepisode: 32
runner_log_interval: 20000
learner_log_interval: 20000
t_max: 2000000
save_model: True
save_model_interval: 400000
log_interval: 20000
test_interval: 50000
