env: "gymma"

env_args:
  key: "thesslink_rl:thesslink/ThessLink-v4-neg"
  time_limit: 150
  pretrained_wrapper: null

# EPyMARL: QMIX, VDN, and COMA always use ``common_reward=True``. For v4 negotiation,
# IQL/MAPPO also use team scalarised reward here (joint agreement signal dominates).
common_reward: true

test_greedy: True
test_nepisode: 32
runner_log_interval: 2000
learner_log_interval: 2000
