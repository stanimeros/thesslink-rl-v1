env: "gymma"

env_args:
  key: "thesslink_rl:thesslink/ThessLink-e3-w6-neg-v1-g64"
  time_limit: 24
  pretrained_wrapper: null
  grid_size: 64
  suggest_bonus: 0.2
  accept_bonus: 1.5
  convergence_bonus: 0.5
  optimal_agreement_bonus: 35.0
  suboptimal_agreement_bonus: 0.0
  wrong_agreement_penalty: -12.0
  timeout_penalty: -5.0

common_reward: true

test_greedy: True
test_nepisode: 32
runner_log_interval: 20000
learner_log_interval: 20000
t_max: 250000
save_model: True
save_model_interval: 50000
log_interval: 20000
test_interval: 50000
