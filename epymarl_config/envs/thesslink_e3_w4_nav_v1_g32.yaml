env: "gymma"

env_args:
  key: "thesslink_rl:thesslink/ThessLink-e3-w4-nav-v1-g32"
  time_limit: 480
  pretrained_wrapper: null
  grid_size: 32
  shaping_gamma: 0.99
  step_penalty: -0.001
  arrival_scale: 10.0
  team_scale: 30.0
  timeout_penalty: -5.0
  milestone_scale: 3.0

common_reward: false

test_greedy: True
test_nepisode: 32
runner_log_interval: 20000
learner_log_interval: 20000
t_max: 2000000
save_model: True
save_model_interval: 400000
log_interval: 20000
test_interval: 50000
