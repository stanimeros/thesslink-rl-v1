env: "gymma"

env_args:
  key: "thesslink_rl:thesslink/ThessLink-e3-w7-full-v1-g64"
  time_limit: 560
  pretrained_wrapper: null
  grid_size: 64
  # ── Negotiation params (aligned with w6_neg g64) ──────────────────────────
  step_penalty: -0.05
  suggest_bonus: 0.2
  accept_bonus: 1.5
  convergence_bonus: 0.5
  optimal_agreement_bonus: 35.0
  suboptimal_agreement_bonus: 0.0
  wrong_agreement_penalty: -12.0
  neg_timeout_penalty: -5.0
  neg_time_limit: 32
  # ── Navigation params (aligned with w6_nav g64) ───────────────────────────
  shaping_gamma: 0.99
  nav_step_penalty: -0.002
  arrival_bonus: 50.0
  nav_timeout_penalty: -12.0
  nav_time_limit: 512

common_reward: false

test_greedy: True
test_nepisode: 32
runner_log_interval: 20000
learner_log_interval: 20000
t_max: 2000000
save_model: True
save_model_interval: 400000
log_interval: 20000
test_interval: 50000
